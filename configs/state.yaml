# Ankaios Startup State Manifest
# This defines the initial workloads to be orchestrated

apiVersion: v1
workloads:
  # Example nginx web server
  nginx-demo:
    runtime: podman
    agent: qm_agent
    restartPolicy: ALWAYS
    tags:
      app: webserver
      demo: ankaios-autosd
    runtimeConfig: |
      image: localhost/nginx:latest
      commandOptions: ["-p", "8080:80"]

  # Example hello-world test container
  hello-world:
    runtime: podman
    agent: qm_agent
    restartPolicy: ON_FAILURE
    tags:
      app: test
      demo: ankaios-autosd
    runtimeConfig: |
      image: localhost/hello-world:latest

  # Fleet connector to receive instructions from the MQTT broker
  fleet_connector:
    runtime: podman
    agent: qm_agent
    restartPolicy: ALWAYS
    tags:
      component: fleet-management
    controlInterfaceAccess:
      allowRules:
        - type: StateRule
          operation: Write
          filterMasks: ["desiredState"]
        - type: StateRule
          operation: Read
          filterMasks: ["desiredState", "workloadStates"]
    runtimeConfig: |
      image: localhost/fleet-connector:latest
      commandOptions:
        - "--network"
        - "host"
        - "-e"
        - "MQTT_BROKER_ADDR=192.168.1.22"
        - "-e"
        - "MQTT_BROKER_PORT=1883"
        - "-e"
        - "VIN=demo_vehicle_001"

