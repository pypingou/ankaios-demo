# Ankaios Server Configuration for AutoSD QM Partition
# This file is formatted in TOML

version = 'v1'

# Path to startup configuration manifest
# This manifest defines the initial workloads to start
startup_manifest = '/etc/ankaios/state.yaml'
state_persistence_file = "/var/lib/ankaios/runtime_state.yaml"

# Server listen address
# Listen on all interfaces within QM partition
address = '0.0.0.0:25551'

# Security mode - set to false for mTLS (secure mode)
insecure = false

# TLS configuration
ca_pem = '/etc/ankaios/certs/ca.pem'
crt_pem = '/etc/ankaios/certs/server.pem'
key_pem = '/etc/ankaios/certs/server-key.pem'
