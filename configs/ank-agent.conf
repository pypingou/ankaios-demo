# Ankaios Agent Configuration for AutoSD QM Partition
# This file is formatted in TOML

version = 'v1'

# Agent name for registration with server
# Must be unique per agent
name = 'qm_agent'

# Server URL
# Connect to local server within QM partition
server_url = 'https://127.0.0.1:25551'

# Path for fifo files management
# Uses /tmp inside QM partition
run_folder = '/tmp/ankaios/'

# Enable podman runtime
# Podman is the default container runtime in AutoSD QM partition
runtimes = [ "podman" ]

# Security mode - set to false for mTLS (secure mode)
insecure = false

# Agent attributes/tags
# These can be used for workload scheduling
tags = { partition = "qm", criticality = "non-critical", location = "qm-partition" }

# TLS configuration
ca_pem = '/etc/ankaios/certs/ca.pem'
crt_pem = '/etc/ankaios/certs/agent.pem'
key_pem = '/etc/ankaios/certs/agent-key.pem'
