[storage]
driver = "overlay"

# Primary read-write storage for runtime-pulled images
graphroot = "/var/lib/containers/storage"
runroot = "/run/containers/storage"

[storage.options]
# Additional read-only storage locations
# Podman checks these in order: read-only first (/usr), then read-write stores (/var)
additionalimagestores = [
    "/usr/lib/containers/storage",
]

[storage.options.overlay]
mountopt = "nodev"
