# Ankaios CLI Configuration for AutoSD QM Partition
# This file is formatted in TOML

version = 'v1'

# Timeout in milliseconds to wait for response from ank-server
response_timeout = 3000

# Verbose output
verbose = false

# Quiet mode (disable output)
quiet = false

# Wait for workloads to be created/deleted
no_wait = false

[default]
# Server URL - connect to local server within QM partition
server_url = 'https://127.0.0.1:25551'

# Security mode - set to false for mTLS (secure mode) - default configuration
# insecure = false

# TLS configuration
ca_pem = '/etc/ankaios/certs/ca.pem'
crt_pem = '/etc/ankaios/certs/cli.pem'
key_pem = '/etc/ankaios/certs/cli-key.pem'
